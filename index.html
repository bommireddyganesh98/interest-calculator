<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Calculator Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            background: #f4f6ff;
            padding: 15px;
            border-radius: 10px;
            display: none;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result p {
            margin: 10px 0;
            font-size: 1.1em;
            color: #333;
        }

        .result b {
            color: #667eea;
        }

        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .actions button {
            width: 48%;
            padding: 10px;
            margin: 0;
            font-size: 0.9em;
        }

        .actions button:nth-child(1) {
            background: #f0f0f0;
            color: #333;
        }

        .actions button:nth-child(1):hover {
            background: #e0e0e0;
        }

        .actions button:nth-child(2) {
            background: #f0f0f0;
            color: #333;
        }

        .actions button:nth-child(2):hover {
            background: #e0e0e0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            input, button {
                padding: 10px;
            }

            .actions button {
                width: 47%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>💰 Interest Calculator Pro</h2>

        <input type="number" id="principal" placeholder="Principal Amount">
        <input type="number" step="0.01" id="rate" placeholder="Rate per ₹100">
        <input type="date" id="startDate">
        <input type="date" id="endDate">

        <button onclick="calculate()">Calculate</button>

        <div class="result" id="result">
            <p id="duration"></p>
            <p id="interest"></p>
            <p id="total"></p>

            <div class="actions">
                <button onclick="exportExcel()">📥 Export Excel</button>
                <button onclick="exportPDF()">🖨️ Export PDF</button>
            </div>
        </div>
    </div>

    <script>
        let calcData = {};

        function calculate() {
            let P = parseFloat(document.getElementById('principal').value);
            let R = parseFloat(document.getElementById('rate').value);
            let start = new Date(document.getElementById('startDate').value);
            let end = document.getElementById('endDate').value ?
                new Date(document.getElementById('endDate').value) : new Date();

            // Validation
            if (!P || P <= 0) {
                alert('Please enter a valid Principal Amount');
                return;
            }
            if (!R || R < 0) {
                alert('Please enter a valid Rate of Interest');
                return;
            }
            if (!start) {
                alert('Please select a Start Date');
                return;
            }
            if (start >= end) {
                alert('Start Date must be before End Date');
                return;
            }

            let months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
            let days = end.getDate() - start.getDate();
            if (days < 0) {
                months--;
                days += 30;
            }

            let monthInterest = (P * R) / 100;
            let interest = (monthInterest * months) + ((monthInterest / 30) * days);
            let total = P + interest;

            calcData = { P, R, months, days, interest, total };

            document.getElementById('duration').innerHTML = "<b>Duration:</b> " + months + " months " + days + " days";
            document.getElementById('interest').innerHTML = "<b>Interest:</b> ₹" + interest.toFixed(2);
            document.getElementById('total').innerHTML = "<b>Total Amount:</b> ₹" + total.toFixed(2);
            document.getElementById('result').classList.add('show');
        }

        function exportExcel() {
            if (!calcData.P) {
                alert('Please calculate interest first');
                return;
            }

            let csv = "Principal,Rate,Duration,Interest,Total Amount\n";
            csv += `${calcData.P},${calcData.R},${calcData.months} months ${calcData.days} days,${calcData.interest.toFixed(2)},${calcData.total.toFixed(2)}`;

            let blob = new Blob([csv], { type: 'text/csv' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'interest_calculation.csv';
            a.click();
        }

        function exportPDF() {
            if (!calcData.P) {
                alert('Please calculate interest first');
                return;
            }
            window.print();
        }

        // Set today's date as default
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
        });
    </script>
</body>
</html>
